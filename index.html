<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NID 配速換算練習</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin:0; font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif; background:#f4f3ee; color:#1a1a1a; padding:16px; }
  .wrap { max-width:620px; margin:0 auto; }
  .top { background:#111; border-radius:16px; padding:18px 22px; display:flex; align-items:center; gap:14px; }
  .top img { height:42px; width:auto; }
  .top .t1 { color:#FFE100; font-size:13px; font-weight:600; letter-spacing:1px; }
  .top .t2 { color:#fff; font-size:22px; font-weight:600; }
  .tabs { display:flex; gap:8px; margin-top:14px; }
  .tab { flex:1; padding:12px; border-radius:12px; border:none; font-size:16px; font-weight:600; cursor:pointer; background:#e7e5dd; color:#5f5e5a; transition:all .15s; }
  .tab.active { background:#111; color:#FFE100; }
  .card { background:#fff; border:1px solid #e0dfd8; border-radius:16px; padding:22px; margin-top:14px; }
  .row { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
  .stat { text-align:center; }
  .stat .n { font-size:26px; font-weight:700; }
  .stat .l { font-size:12px; color:#9c9a93; }
  .qtype { background:#FFF8D6; color:#8A6D00; font-size:12px; font-weight:600; padding:5px 13px; border-radius:8px; display:inline-block; }
  .question { font-size:20px; font-weight:600; line-height:1.65; margin:14px 0 4px; min-height:60px; }
  input { width:100%; font-size:17px; padding:11px 14px; border:1px solid #cfcdc4; border-radius:10px; outline:none; }
  input:focus { border-color:#111; }
  .btn { border:none; border-radius:10px; font-weight:600; cursor:pointer; padding:0 22px; height:42px; font-size:16px; }
  .btn-y { background:#FFE100; color:#111; }
  .btn-k { background:#111; color:#FFE100; }
  .btn-ghost { background:transparent; color:#5f5e5a; border:1px solid #cfcdc4; height:38px; font-size:14px; }
  .fb { margin-top:16px; padding:13px 16px; border-radius:10px; font-size:16px; display:none; }
  .sol { margin-top:14px; background:#FFF8D6; border-radius:10px; padding:16px 18px; display:none; }
  .sol .h { font-size:14px; font-weight:600; color:#8A6D00; margin-bottom:10px; }
  .sol .step { font-size:15px; line-height:1.9; color:#3a3000; margin-bottom:4px; }
  .sol .num { display:inline-block; width:22px; height:22px; background:#111; color:#FFE100; border-radius:50%; text-align:center; line-height:22px; font-size:13px; font-weight:600; margin-right:8px; }
  .timer-wrap { height:8px; background:#e7e5dd; border-radius:4px; overflow:hidden; margin:14px 0; }
  .timer-bar { height:100%; background:#FFE100; width:100%; transition:width .1s linear; }
  .big-msg { text-align:center; padding:20px 0; }
  .big-msg .score { font-size:54px; font-weight:700; color:#111; }
  .big-msg .lbl { font-size:15px; color:#5f5e5a; margin-top:4px; }
  .hide { display:none !important; }
  .hint { font-size:13px; color:#9c9a93; margin-top:10px; }
</style>
</head>

      <input id="c-answer" type="text" placeholder="快速輸入答案" autocomplete="off" inputmode="numeric">
      <div class="row" style="margin-top:12px;">
        <button class="btn btn-y" id="c-check">送出</button>
      </div>
      <div class="fb" id="c-fb"></div>
    </div>

    <div class="card hide" id="c-end-screen">
      <div class="big-msg">
        <div id="c-end-title" style="font-size:22px;font-weight:700;color:#111;margin-bottom:10px;">差一點！</div>
        <div class="score" id="c-final">0 / 10</div>
        <div class="lbl" id="c-end-note" style="margin-top:8px;"></div>
        <button class="btn btn-y" id="c-again" style="margin-top:18px;height:46px;">再挑戰一次</button>
      </div>
    </div>
  </div>
</div>

<script>

function fmtTime(sec){ sec=Math.round(sec*10)/10; var m=Math.floor(sec/60); var s=sec-m*60; var ss=(s%1===0)?String(s):s.toFixed(1); if(s<10) ss="0"+ss; return m+":"+ss; }
function fmtClock(sec){ sec=Math.round(sec); var h=Math.floor(sec/3600); var m=Math.floor((sec%3600)/60); var s=sec%60; var p=function(n){return n<10?"0"+n:""+n;}; if(h>0) return h+":"+p(m)+":"+p(s); return m+":"+p(s); }
function rnd(min,max,step){ step=step||1; return Math.floor((Math.random()*(max-min)/step))*step+min; }
function pick(a){ return a[Math.floor(Math.random()*a.length)]; }

function makeQuestion(){
  var type=rnd(0,6); var q={};
  if(type===0){
    var d=pick([200,400,600,800]); var perKm=rnd(180,330,5); var seg=perKm*d/1000; var reps=pick([6,8,10,12]); var w=rnd(1,reps+1);
    q.type="短間歇 → 每公里配速";
    q.text="帶一組做 "+reps+" 趟 "+d+"m 短間歇，第 "+w+" 趟跑出 "+fmtTime(seg)+"。這一趟換算每公里配速是幾分幾秒？";
    q.answerSec=perKm;
    q.steps=[d+"m 換成秒："+fmtTime(seg)+" = "+Math.round(seg)+" 秒。","1 公里 = "+(1000/d)+" 個 "+d+"m。","相乘："+Math.round(seg)+" × "+(1000/d)+" = "+Math.round(perKm)+" 秒。","換回："+Math.round(perKm)+" 秒 = "+fmtTime(perKm)+"。"];
  } else if(type===1){
    var d2=pick([1000,1200,1600,2000]); var p2=rnd(190,360,5); var s2=p2*d2/1000; var r2=pick([4,5,6]);
    q.type="長間歇 → 每公里配速";
    q.text="長間歇 "+r2+" 趟 "+d2+"m，學員一趟跑 "+fmtTime(s2)+"。換算每公里配速是幾分幾秒？";
    q.answerSec=p2;
    q.steps=[d2+"m 換成秒："+fmtTime(s2)+" = "+Math.round(s2)+" 秒。",d2+"m = "+(d2/1000)+" 公里。","相除："+Math.round(s2)+" ÷ "+(d2/1000)+" = "+Math.round(p2)+" 秒。","換回："+Math.round(p2)+" 秒 = "+fmtTime(p2)+"。"];
  } else if(type===2){
    var p3=rnd(200,390,5); var td=pick([3000,4000,5000,6000]); var tt=p3*td/1000;
    q.type="Tempo 跑 → 每公里配速";
    q.text="Tempo run "+(td/1000)+"K 總共跑 "+fmtClock(tt)+"，平均每公里配速是幾分幾秒？";
    q.answerSec=p3;
    q.steps=["總時間換成秒："+fmtClock(tt)+" = "+Math.round(tt)+" 秒。",(td/1000)+" 公里。","相除："+Math.round(tt)+" ÷ "+(td/1000)+" = "+Math.round(p3)+" 秒。","換回："+Math.round(p3)+" 秒 = "+fmtTime(p3)+"。"];
  } else if(type===3){
    var p4=rnd(210,390,5);
    q.type="配速跑 → 單圈秒數";
    q.text="請學員用每公里 "+fmtTime(p4)+" 的配速跑，操場一圈 400m。他每圈應該跑幾秒？";
    q.answerSec=p4*0.4; q.unit="秒";
    q.steps=["每公里換成秒："+fmtTime(p4)+" = "+Math.round(p4)+" 秒。","一圈 400m = 0.4 公里。","相乘："+Math.round(p4)+" × 0.4 = "+Math.round(p4*0.4)+" 秒。","每圈約 "+Math.round(p4*0.4)+" 秒。"];
  } else if(type===4){
    var p5=rnd(200,360,5); var laps=pick([4,6,8,10,12]); var totD=laps*400; var totT=p5*totD/1000;
    q.type="配速 → 總時間";
    q.text="以每公里 "+fmtTime(p5)+" 配速，跑 "+laps+" 圈（"+totD+"m）總共要多久？";
    q.answerSec=totT; q.mode="clock";
    q.steps=["每公里換成秒："+fmtTime(p5)+" = "+Math.round(p5)+" 秒。",laps+" 圈 × 400m = "+(totD/1000)+" 公里。","相乘："+Math.round(p5)+" × "+(totD/1000)+" = "+Math.round(totT)+" 秒。","換回："+Math.round(totT)+" 秒 = "+fmtClock(totT)+"。"];
  } else {
    var p6=pick([270,285,300,315,330,345,360,375,390]); var rd=pick([10000,21097.5,42195]); var rn=rd===10000?"10K":(rd===21097.5?"半程馬拉松":"全程馬拉松"); var rt=p6*rd/1000;
    q.type="賽事配速 → 完賽時間";
    q.text="學員想用每公里 "+fmtTime(p6)+" 配速跑完"+rn+"（"+(rd/1000)+"km），預計完賽時間？";
    q.answerSec=rt; q.mode="clock"; q.tol=5;
    q.steps=["每公里換成秒："+fmtTime(p6)+" = "+p6+" 秒。",rn+" = "+(rd/1000)+" 公里。","相乘："+p6+" × "+(rd/1000)+" = "+Math.round(rt)+" 秒。","換回："+Math.round(rt)+" 秒 = "+fmtClock(rt)+"。"];
  }
  return q;
}
function parseAns(str){ str=(str||"").trim(); if(!str) return null; str=str.replace(/：/g,":"); if(str.indexOf(":")>=0){ var pp=str.split(":").map(function(x){return parseFloat(x);}); if(pp.some(isNaN)) return null; if(pp.length===3) return pp[0]*3600+pp[1]*60+pp[2]; return pp[0]*60+pp[1]; } var v=parseFloat(str); return isNaN(v)?null:v; }
function ansDisplay(q){ if(q.unit==="秒") return Math.round(q.answerSec)+" 秒"; if(q.mode==="clock") return fmtClock(q.answerSec); return fmtTime(q.answerSec)+"（每公里）"; }

var $=function(id){return document.getElementById(id);};

// tabs
$("tab-practice").onclick=function(){ $("tab-practice").classList.add("active"); $("tab-challenge").classList.remove("active"); $("practice").classList.remove("hide"); $("challenge").classList.add("hide"); stopTimer(); };
$("tab-challenge").onclick=function(){ $("tab-challenge").classList.add("active"); $("tab-practice").classList.remove("active"); $("challenge").classList.remove("hide"); $("practice").classList.add("hide"); };

// ===== PRACTICE =====
var pSolved=0,pFirst=0,pCur=null,pAttempts=0,pDone=false;
function pRender(){ pDone=false; pAttempts=0; pCur=makeQuestion(); $("p-qtype").textContent=pCur.type; $("p-attempts").textContent=""; $("p-question").textContent=pCur.text; var i=$("p-answer"); i.value=""; i.disabled=false; i.focus(); $("p-fb").style.display="none"; $("p-sol").style.display="none"; $("p-check").style.display="inline-block"; $("p-pass").style.display="inline-block"; }
function pShowSol(){ var h=""; for(var i=0;i<pCur.steps.length;i++){ h+="<div class='step'><span class='num'>"+(i+1)+"</span>"+pCur.steps[i]+"</div>"; } h+="<div style='margin-top:10px;font-weight:600;color:#111;'>答案："+ansDisplay(pCur)+"</div>"; $("p-steps").innerHTML=h; $("p-sol").style.display="block"; }
function pFinish(first){ pDone=true; pSolved++; if(first) pFirst++; $("p-solved").textContent=pSolved; $("p-first").textContent=pFirst; $("p-answer").disabled=true; $("p-check").style.display="none"; $("p-pass").style.display="none"; }
function pCheck(){ if(pDone) return; var val=parseAns($("p-answer").value); var fb=$("p-fb"); if(val===null){ fb.style.display="block"; fb.style.background="#f1efe8"; fb.style.color="#5f5e5a"; fb.textContent="請輸入有效答案。"; return; } pAttempts++; var tol=pCur.tol||1.0; if(Math.abs(val-pCur.answerSec)<=tol){ fb.style.display="block"; fb.style.background="#FFF8D6"; fb.style.color="#5a4a00"; fb.innerHTML="<b>答對了！</b>　"+(pAttempts===1?"一次就對，漂亮。":"第 "+pAttempts+" 次答對。"); pFinish(pAttempts===1); pShowSol(); } else { fb.style.display="block"; fb.style.background="#f1efe8"; fb.style.color="#2c2c2a"; fb.innerHTML="<b>還不對，再算一次。</b>"; $("p-attempts").textContent="已嘗試 "+pAttempts+" 次"; $("p-answer").select(); } }
$("p-check").onclick=pCheck;
$("p-pass").onclick=function(){ if(pDone) return; pFinish(false); $("p-fb").style.display="none"; pShowSol(); };
$("p-next").onclick=pRender;
$("p-answer").addEventListener("keydown",function(e){ if(e.key==="Enter"&&!pDone) pCheck(); });
$("p-reset").onclick=function(){ pSolved=0;pFirst=0; $("p-solved").textContent="0"; $("p-first").textContent="0"; pRender(); };

// ===== CHALLENGE =====
var cStreak=0,cBest=0,cCur=null,cTimer=null,cTimeLeft=0,cEnded=false;
var LIMIT=30;
var GOAL=10;
function stopTimer(){ if(cTimer){ clearInterval(cTimer); cTimer=null; } }
function cStartGame(){ cStreak=0; $("c-streak").textContent="0 / "+GOAL; $("c-start-screen").classList.add("hide"); $("c-end-screen").classList.add("hide"); $("c-play-screen").classList.remove("hide"); cNext(); }
function cNext(){ cEnded=false; cCur=makeQuestion(); $("c-qtype").textContent=cCur.type; $("c-question").textContent=cCur.text; var i=$("c-answer"); i.value=""; i.disabled=false; i.focus(); $("c-fb").style.display="none"; cTimeLeft=LIMIT*1000; $("c-timer").style.width="100%"; $("c-seconds").textContent=LIMIT; $("c-seconds").style.color="#111"; stopTimer(); var t0=Date.now(); cTimer=setInterval(function(){ var el=Date.now()-t0; cTimeLeft=LIMIT*1000-el; var pct=Math.max(0,cTimeLeft/(LIMIT*1000)*100); $("c-timer").style.width=pct+"%"; var secLeft=Math.max(0,Math.ceil(cTimeLeft/1000)); $("c-seconds").textContent=secLeft; if(secLeft<=5){ $("c-seconds").style.color="#A32D2D"; $("c-timer").style.background="#E24B4A"; } else { $("c-timer").style.background="#FFE100"; } if(cTimeLeft<=0){ stopTimer(); cLose("超時了！"); } },100); }
function cLose(reason){ stopTimer(); cEnded=true; $("c-final").textContent=cStreak+" / "+GOAL; $("c-final").style.color="#111"; $("c-end-title").textContent="差一點！"; $("c-end-note").innerHTML=reason+"　正確答案："+ansDisplay(cCur)+"<br>再挑戰一次，連對 "+GOAL+" 題就過關。"; $("c-play-screen").classList.add("hide"); $("c-end-screen").classList.remove("hide"); }
function cWin(){ stopTimer(); cEnded=true; cBest++; $("c-best").textContent=cBest; $("c-final").textContent="過關！"; $("c-final").style.color="#caa500"; $("c-end-title").textContent="太強了！"; $("c-end-note").innerHTML="連續答對 "+GOAL+" 題，配速換算已經是你的直覺了。"; $("c-play-screen").classList.add("hide"); $("c-end-screen").classList.remove("hide"); }
function cCheck(){ if(cEnded) return; var val=parseAns($("c-answer").value); if(val===null){ var fb=$("c-fb"); fb.style.display="block"; fb.style.background="#f1efe8"; fb.style.color="#5f5e5a"; fb.textContent="請輸入有效答案。"; return; } var tol=cCur.tol||1.0; if(Math.abs(val-cCur.answerSec)<=tol){ cStreak++; $("c-streak").textContent=cStreak+" / "+GOAL; if(cStreak>=GOAL){ cWin(); return; } var fb=$("c-fb"); fb.style.display="block"; fb.style.background="#FFF8D6"; fb.style.color="#5a4a00"; fb.innerHTML="<b>答對！</b> 還剩 "+(GOAL-cStreak)+" 題過關"; setTimeout(cNext,400); } else { cLose("答錯了！"); } }
$("c-start").onclick=cStartGame;
$("c-again").onclick=cStartGame;
$("c-check").onclick=cCheck;
$("c-answer").addEventListener("keydown",function(e){ if(e.key==="Enter"&&!cEnded) cCheck(); });

pRender();

</script>
</body>
</html>
